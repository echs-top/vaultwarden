name: 部署 Vaultwarden 前端

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Vaultwarden 提取版压缩包直链 (包含 web-vault 目录)'
        required: true
        default: 'https://github.com/czyt/vaultwarden-binary/releases/download/1.35.8-extracted/vaultwarden-linux-amd64-extracted.zip'
      vault_domain:
        description: '你的 Vaultwarden 后端域名 (必须包含 https://)'
        required: true
        default: 'https://vault.example.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理当前目录
        run: |
          # 保留 Action 自身和 Git 配置，删除其余所有内容
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压到临时目录
        run: |
          curl -L -o release.tmp "${{ github.event.inputs.download_url }}"
          
          # 创建临时目录统一解压，避免污染根目录并方便查找
          mkdir -p extract_tmp
          
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf release.tmp -C extract_tmp
          else
            unzip -q -o release.tmp -d extract_tmp
          fi
          rm release.tmp

      - name: 提取 web-vault 内容至根目录
        run: |
          # 自动寻找解压出来的 web-vault 文件夹
          WEB_VAULT_DIR=$(find extract_tmp -type d -name "web-vault" -print -quit)
          
          if [ -n "$WEB_VAULT_DIR" ]; then
            echo "检测到 web-vault 目录: $WEB_VAULT_DIR，正在同步内容..."
            shopt -s dotglob
            mv "$WEB_VAULT_DIR"/* .
            shopt -u dotglob
          else
            echo "错误: 未在压缩包中找到 web-vault 目录！请检查链接内容。"
            exit 1
          fi
          
          # 清除残留的临时解压文件夹（包含不需要的后端二进制文件等）
          rm -rf extract_tmp

      - name: 清理大体积 Map 文件
        run: |
          # 删除 .map 文件以加速部署并保护源码逻辑
          find . -name "*.map" -type f -delete

      - name: 自动生成配置文件 (Vercel & Netlify)
        run: |
          # 获取输入的域名，并确保末尾没有斜杠
          DOMAIN=$(echo "${{ github.event.inputs.vault_domain }}" | sed 's:/*$::')
          
          # 生成 vercel.json
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/api/:path*", "destination": "$DOMAIN/api/:path*" },
              { "source": "/identity/:path*", "destination": "$DOMAIN/identity/:path*" },
              { "source": "/icons/:path*", "destination": "$DOMAIN/icons/:path*" },
              { "source": "/notifications/:path*", "destination": "$DOMAIN/notifications/:path*" },
              { "source": "/attachments/:path*", "destination": "$DOMAIN/attachments/:path*" },
              { "source": "/((?!api|identity|icons|notifications|attachments).*)", "destination": "/index.html" }
            ]
          }
          EOF

          # 生成 netlify.toml
          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/identity/*"
            to = "$DOMAIN/identity/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/icons/*"
            to = "$DOMAIN/icons/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/notifications/*"
            to = "$DOMAIN/notifications/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/attachments/*"
            to = "$DOMAIN/attachments/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF
          
          echo "配置文件已生成，后端指向: $DOMAIN"

      - name: 提交并推送
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 自动配置前端并同步至最新 (Backend: ${{ github.event.inputs.vault_domain }})"
            git push
          fi
