name: 部署 Vaultwarden 前端 (自动配置版)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入前端压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/dani-garcia/bw_web_builds/releases/download/v2026.3.1/bw_web_v2026.3.1.tar.gz'
      vault_domain:
        description: '你的 Vaultwarden 后端域名 (必须包含 https://)'
        required: true
        default: 'https://vault.example.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理当前目录
        run: |
          # 保留 Action 自身和 Git 配置，删除其余所有内容
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压
        run: |
          curl -L -o web_vault.tmp "${{ github.event.inputs.download_url }}"
          
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf web_vault.tmp
          else
            unzip -o web_vault.tmp
          fi
          rm web_vault.tmp

      - name: 智能移动内容至根目录
        run: |
          # 自动寻找解压出来的文件夹（避开系统目录）
          SUBDIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          
          if [ -n "$SUBDIR" ]; then
            echo "检测到子文件夹: $SUBDIR，正在同步内容..."
            shopt -s dotglob
            mv "$SUBDIR"/* .
            rmdir "$SUBDIR"
            shopt -u dotglob
          fi

      - name: 清理大体积 Map 文件
        run: |
          # 删除 .map 文件以加速部署并保护源码逻辑
          find . -name "*.map" -type f -delete

      - name: 自动生成配置文件 (Vercel & Netlify)
        run: |
          # 获取输入的域名，并确保末尾没有斜杠
          DOMAIN=$(echo "${{ github.event.inputs.vault_domain }}" | sed 's:/*$::')
          
          # 生成 vercel.json
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/api/:path*", "destination": "$DOMAIN/api/:path*" },
              { "source": "/identity/:path*", "destination": "$DOMAIN/identity/:path*" },
              { "source": "/icons/:path*", "destination": "$DOMAIN/icons/:path*" },
              { "source": "/notifications/:path*", "destination": "$DOMAIN/notifications/:path*" },
              { "source": "/attachments/:path*", "destination": "$DOMAIN/attachments/:path*" },
              { "source": "/((?!api|identity|icons|notifications|attachments).*)", "destination": "/index.html" }
            ]
          }
          EOF

          # 生成 netlify.toml
          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/identity/*"
            to = "$DOMAIN/identity/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/icons/*"
            to = "$DOMAIN/icons/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/notifications/*"
            to = "$DOMAIN/notifications/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/attachments/*"
            to = "$DOMAIN/attachments/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF
          
          echo "配置文件已生成，后端指向: $DOMAIN"

      - name: 提交并推送
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 自动配置前端并同步至最新 (Backend: ${{ github.event.inputs.vault_domain }})"
            git push
          fi
